name: Android CI/CD

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Lint & Code Quality
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for versioning

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint (Dev)
        run: ./gradlew lintDevDebug --stacktrace

      - name: Run Lint (Prod)
        run: ./gradlew lintProdDebug --stacktrace

      - name: Upload Lint Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-reports
          path: app/build/reports/lint/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # Unit Tests
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests (Dev)
        run: ./gradlew testDevDebugUnitTest --stacktrace

      - name: Run Unit Tests (Prod)
        run: ./gradlew testProdDebugUnitTest --stacktrace

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: app/build/reports/tests/
          retention-days: 7

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/build/test-results/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # Build Debug APKs
  # ═══════════════════════════════════════════════════════════════
  build-debug:
    name: Build Debug APKs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Dev Debug APK
        run: ./gradlew assembleDevDebug --stacktrace

      - name: Build Prod Debug APK
        run: ./gradlew assembleProdDebug --stacktrace

      - name: Upload Dev Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-dev-debug
          path: app/build/outputs/apk/dev/debug/app-dev-debug.apk
          retention-days: 14

      - name: Upload Prod Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-prod-debug
          path: app/build/outputs/apk/prod/debug/app-prod-debug.apk
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════
  # Build Release APKs (only on tags)
  # ═══════════════════════════════════════════════════════════════
  build-release:
    name: Build Release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Dev Release APK
        run: ./gradlew assembleDevRelease --stacktrace

      - name: Build Prod Release APK
        run: ./gradlew assembleProdRelease --stacktrace

      - name: Rename APKs with version
        run: |
          mkdir -p release-apks
          cp app/build/outputs/apk/dev/release/app-dev-release.apk \
             release-apks/russify-dev-${{ steps.version.outputs.VERSION }}.apk
          cp app/build/outputs/apk/prod/release/app-prod-release.apk \
             release-apks/russify-${{ steps.version.outputs.VERSION }}.apk

      - name: Upload Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: release-apks/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-apks/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════
  # Instrumented Tests (optional, requires emulator)
  # ═══════════════════════════════════════════════════════════════
  instrumented-test:
    name: Instrumented Tests
    runs-on: macos-latest  # macOS has hardware acceleration for emulator
    timeout-minutes: 45
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: ./gradlew connectedDevDebugAndroidTest --stacktrace

      - name: Upload Instrumented Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instrumented-test-reports
          path: app/build/reports/androidTests/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # Dependency Check & Security
  # ═══════════════════════════════════════════════════════════════
  security:
    name: Security & Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate dependency tree
        run: ./gradlew dependencies > dependencies.txt

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: dependencies.txt
          retention-days: 7
